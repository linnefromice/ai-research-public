name: public-screenshots-check

# PR で public-site/src または package.json が更新されたにも関わらず
# screenshots/manifest.json が更新されていない場合に warning コメントを投稿する。
# Playwright は走らせず、SHA 比較のみの軽量ジョブ。

on:
  pull_request:
    paths:
      - 'public-site/src/**'
      - 'public-site/package.json'
      - 'public-site/screenshots/manifest.json'
      - 'public-site/scripts/compute-source-sha.mjs'

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute source SHAs
        id: sha
        working-directory: public-site
        run: |
          set -euo pipefail
          CURRENT=$(node scripts/compute-source-sha.mjs)
          if [ -f screenshots/manifest.json ]; then
            MANIFEST=$(jq -r '.source_tree_sha // "missing"' screenshots/manifest.json)
          else
            MANIFEST="missing"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$MANIFEST" ]; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "source_tree_sha matches ($CURRENT). No drift."
          else
            echo "status=drift" >> "$GITHUB_OUTPUT"
            echo "source_tree_sha mismatch. current=$CURRENT manifest=$MANIFEST"
          fi

      - name: Post or update warning comment
        if: steps.sha.outputs.status == 'drift'
        uses: actions/github-script@v7
        env:
          CURRENT: ${{ steps.sha.outputs.current }}
          MANIFEST: ${{ steps.sha.outputs.manifest }}
        with:
          script: |
            const marker = '<!-- public-screenshots-drift -->';
            const body = [
              marker,
              '⚠️ **Public-site screenshots drift detected**',
              '',
              '`public-site/src` or `public-site/package.json` has been updated, but `public-site/screenshots/manifest.json` was not refreshed.',
              '',
              '| source_tree_sha | value |',
              '|---|---|',
              `| current | \`${process.env.CURRENT}\` |`,
              `| manifest | \`${process.env.MANIFEST}\` |`,
              '',
              '**Options**',
              '1. Run `cd public-site && npm run screenshot` locally and commit the updated `screenshots/` contents.',
              '2. Ignore this warning — after merge the `public-screenshots-refresh` workflow will open a follow-up PR automatically.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

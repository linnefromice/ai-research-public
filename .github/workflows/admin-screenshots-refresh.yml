name: admin-screenshots-refresh

# Trigger:
#   - main push で admin-site/src or package.json が変わったとき (drift があれば run)
#   - 毎日 03:00 UTC の schedule (runner 環境差等の変化を検知する safety net)
#   - workflow_dispatch (手動実行)
#
# admin-site は fixtures + Date + TZ 固定 → schedule run でも通常は PNG が
# byte-identical で create-pull-request が no-op。変化があれば PR が自動で開く。

on:
  push:
    branches: [main]
    paths:
      - 'admin-site/src/**'
      - 'admin-site/package.json'
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 12:00 JST daily
  workflow_dispatch: {}

concurrency:
  group: admin-screenshots-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check drift (cheap)
        id: pre
        working-directory: admin-site
        run: |
          set -euo pipefail
          CURRENT=$(node scripts/compute-source-sha.mjs)
          if [ -f screenshots/manifest.json ]; then
            MANIFEST=$(jq -r '.source_tree_sha // "missing"' screenshots/manifest.json)
          else
            MANIFEST="missing"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$MANIFEST" ]; then
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide run mode
        id: decide
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled or manual run — regenerating unconditionally"
          elif [[ "${{ steps.pre.outputs.src_changed }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Push detected drift — regenerating"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Push without drift — skipping"
          fi

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        working-directory: admin-site
        run: npm ci

      - name: Install Chromium
        if: steps.decide.outputs.run == 'true'
        working-directory: admin-site
        run: npx playwright install chromium --with-deps

      - name: Regenerate screenshots
        if: steps.decide.outputs.run == 'true'
        working-directory: admin-site
        run: npm run screenshot

      - name: Create refresh PR (only if there are changes)
        if: steps.decide.outputs.run == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(admin): refresh admin-site screenshots'
          branch: chore/refresh-admin-screenshots
          delete-branch: true
          title: 'chore(admin): refresh admin-site screenshots'
          body: |
            Auto-generated by the `admin-screenshots-refresh` workflow.

            Detected drift between `admin-site/src` / `admin-site/package.json` and `admin-site/screenshots/manifest.json`.
            Regenerated all PNGs with Playwright against fixtures and updated `manifest.json`.

            Merge this PR to resolve the drift warning on subsequent PRs.

            - source_tree_sha (current): `${{ steps.pre.outputs.current }}`
            - source_tree_sha (before): `${{ steps.pre.outputs.manifest }}`
          labels: |
            auto-generated
            admin-screenshots
          add-paths: |
            admin-site/screenshots/

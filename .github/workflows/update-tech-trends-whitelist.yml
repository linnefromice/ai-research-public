name: Update Tech Trends Whitelist

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 00:00 UTC (09:00 JST)
  workflow_dispatch:
    inputs:
      focus_category:
        description: 'Focus category for new site discovery (e.g., "AI", "security", "frontend")'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  update-whitelist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate existing URLs
        id: validate
        run: |
          echo "## URL Validation Report" > validation-report.txt
          echo "" >> validation-report.txt
          while IFS= read -r url; do
            url="$(echo "$url" | xargs)"
            [[ -z "$url" || "$url" == \#* ]] && continue
            http_code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$url" 2>/dev/null || echo "000")
            if [[ "$http_code" -ge 200 && "$http_code" -lt 400 ]]; then
              echo "- ✅ $url (HTTP $http_code)" >> validation-report.txt
            else
              echo "- ❌ $url (HTTP $http_code)" >> validation-report.txt
            fi
          done < tech-trends/whitelist.txt
          cat validation-report.txt

      - name: Update whitelist with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          prompt: |
            あなたは技術トレンド収集のためのホワイトリスト管理者です。

            ## 現在のホワイトリスト
            `tech-trends/whitelist.txt` を読んでください。

            ## URL検証結果
            `validation-report.txt` を読んでください。❌マークのURLは無効です。

            ## タスク
            1. 無効なURL（❌マーク）があれば除外を検討してください
            2. 以下のカテゴリから新規の優良サイトを調査し追加を検討してください:
               - 技術ニュースサイト（ペイウォールなし）
               - 開発者ブログ・技術ブログ
               - GitHub Trending / OSS リリースノート
               ${{ github.event.inputs.focus_category && format('- 特に重点カテゴリ: {0}', github.event.inputs.focus_category) || '' }}
            3. 選定基準:
               - ペイウォールがないこと
               - 記事本文がスクレイピング/取得しやすいこと
               - 定期的に更新されていること
               - 技術的な質が高いこと
            4. `tech-trends/whitelist.txt` を更新してください（1行1URL、#でコメント可）

            変更がある場合はPRを作成してください。PR本文には追加/除外の理由を記載してください。
          allowed_tools: "Bash,Read,Write,Edit,WebSearch,WebFetch"

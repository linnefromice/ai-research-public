name: public-screenshots-refresh

# Trigger:
#   - main push で public-site/src or package.json が変わったとき
#   - 毎日 03:15 UTC の schedule (content 更新で visual が変わった場合の追従)
#   - workflow_dispatch (手動実行)
#
# Playwright + Astro dev で 20 PNG を再生成し、diff があれば
# chore/refresh-public-site-screenshots ブランチで PR を自動作成する。

on:
  push:
    branches: [main]
    paths:
      - 'public-site/src/**'
      - 'public-site/package.json'
  schedule:
    - cron: '15 3 * * *'  # 03:15 UTC = 12:15 JST daily
  workflow_dispatch: {}

concurrency:
  group: public-screenshots-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check drift (push のみ gate)
        id: pre
        working-directory: public-site
        run: |
          set -euo pipefail
          CURRENT=$(node scripts/compute-source-sha.mjs)
          if [ -f screenshots/manifest.json ]; then
            MANIFEST=$(jq -r '.source_tree_sha // "missing"' screenshots/manifest.json)
          else
            MANIFEST="missing"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$MANIFEST" ]; then
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide run mode
        id: decide
        run: |
          # schedule / workflow_dispatch は常に run (content 更新を反映するため)
          # push trigger は drift があるときのみ run
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled or manual run — regenerating unconditionally"
          elif [[ "${{ steps.pre.outputs.src_changed }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Push detected drift — regenerating"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Push without drift — skipping"
          fi

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        working-directory: public-site
        run: npm ci

      - name: Install Chromium
        if: steps.decide.outputs.run == 'true'
        working-directory: public-site
        run: npx playwright install chromium --with-deps

      - name: Regenerate screenshots
        if: steps.decide.outputs.run == 'true'
        working-directory: public-site
        run: npm run screenshot

      - name: Create refresh PR (only if there are changes)
        if: steps.decide.outputs.run == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(public): refresh public-site screenshots'
          branch: chore/refresh-public-site-screenshots
          delete-branch: true
          title: 'chore(public): refresh public-site screenshots'
          body: |
            Auto-generated by the `public-screenshots-refresh` workflow.

            Trigger: `${{ github.event_name }}`

            If triggered by `push`, source drift was detected between `public-site/src` / `package.json` and `screenshots/manifest.json`.
            If triggered by `schedule`, daily content updates likely caused visual drift.

            - source_tree_sha (current): `${{ steps.pre.outputs.current }}`
            - source_tree_sha (manifest): `${{ steps.pre.outputs.manifest }}`
          labels: |
            auto-generated
            public-screenshots
          add-paths: |
            public-site/screenshots/

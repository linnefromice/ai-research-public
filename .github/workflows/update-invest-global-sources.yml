name: Update Invest Global Sources

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 00:00 UTC (09:00 JST)
  workflow_dispatch:
    inputs:
      focus_category:
        description: 'Focus category for new source discovery (e.g., "us-stocks", "global-index", "forex", "commodities", "crypto", "analysis")'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate existing feed URLs
        id: validate
        run: |
          echo "## Feed Validation Report" > validation-report.txt
          echo "" >> validation-report.txt
          jq -r '.[] | select(.feed != null) | "\(.name)\t\(.feed)"' invest-global/sources.json | while IFS=$'\t' read -r name feed; do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$feed" 2>/dev/null || echo "000")
            if [[ "$http_code" -ge 200 && "$http_code" -lt 400 ]]; then
              echo "- ✅ $name: $feed (HTTP $http_code)" >> validation-report.txt
            else
              echo "- ❌ $name: $feed (HTTP $http_code)" >> validation-report.txt
            fi
          done
          # Web URL も検証
          jq -r '.[] | select(.feed == null) | "\(.name)\t\(.url)"' invest-global/sources.json | while IFS=$'\t' read -r name url; do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$url" 2>/dev/null || echo "000")
            if [[ "$http_code" -ge 200 && "$http_code" -lt 400 ]]; then
              echo "- ✅ $name (web only): $url (HTTP $http_code)" >> validation-report.txt
            else
              echo "- ❌ $name (web only): $url (HTTP $http_code)" >> validation-report.txt
            fi
          done
          cat validation-report.txt

      - name: Update sources with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a source list manager for global investment information targeting individual investors.

            ## Current Source List
            Read `invest-global/sources.json`. It's in JSON format with entries containing name, url, feed, and category fields.

            ## Feed Validation Results
            Read `validation-report.txt`. Feeds marked with ❌ are invalid.

            ## Task
            1. Consider excluding sources with invalid feeds (❌ marks)
            2. Research and consider adding high-quality new sites from the following categories:
               - US Stocks (category: "us-stocks")
               - Global Index & ETFs (category: "global-index")
               - Forex & Currency Markets (category: "forex")
               - Commodities (category: "commodities")
               - Cryptocurrency & Digital Assets (category: "crypto")
               - Investment Analysis & Commentary (category: "analysis")
               ${{ github.event.inputs.focus_category && format('- Especially focus on: {0}', github.event.inputs.focus_category) || '' }}
            3. Selection criteria:
               - Focused on individual investor needs
               - No paywall/free access
               - RSS/Atom feeds preferred (if not available, set feed: null and use Web URL only)
               - Abundant concrete market data and figures
               - Timely market coverage and updates
            4. Update `invest-global/sources.json` (JSON array format)

            If there are changes, create a PR with reasons for additions/removals in the PR description.
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,WebSearch,WebFetch"
